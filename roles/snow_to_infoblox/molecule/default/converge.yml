---
# Converge play. Runs the role with an obviously-invalid sys_id under the
# expectation that preflight catches it BEFORE any external API call.

- name: "Converge"
  hosts: all
  gather_facts: false
  vars:
    snow_task_sys_id: "00000000000000000000000000000000"

  tasks:
    - name: "Run the role and expect a preflight failure path"
      block:
        - name: "Include the role"
          ansible.builtin.include_role:
            name: snow_to_infoblox

      rescue:
        - name: "Confirm we failed at preflight, not in a real API call"
          ansible.builtin.debug:
            msg: >-
              Role failed as expected during preflight (env vars missing
              or sys_id check) — this is the correct behaviour for the
              molecule no-credentials scenario.
