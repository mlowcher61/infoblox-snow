---
# snow_to_infoblox — main task flow.
#
# Sections:
#   0. Preflight: assert credentials are present (env-injected by AAP)
#   1. Fetch the catalog task from ServiceNow
#   2. Locate and download the CSV attachment
#   3. Submit CSV to NIOS native csv_import (uploadinit → POST → csv_import)
#   4. Poll csvimporttask until terminal status, gather counts
#   5. Report back to ServiceNow + clean up

# ===========================================================================
# 0. PREFLIGHT
# ===========================================================================
- name: "Preflight | Initialise missing-vars list"
  ansible.builtin.set_fact:
    missing_credential_env_vars: []

- name: "Preflight | Build list of unset/empty required env vars"
  ansible.builtin.set_fact:
    missing_credential_env_vars: "{{ missing_credential_env_vars + [item] }}"
  loop: "{{ snow_required_env_vars + infoblox_required_env_vars }}"
  when: lookup('env', item) | length == 0
  changed_when: false

- name: "Preflight | Fail with a clear message if any credential env var is missing"
  ansible.builtin.assert:
    that:
      - missing_credential_env_vars | default([]) | length == 0
    fail_msg: >-
      Missing required credential environment variables:
      {{ missing_credential_env_vars | default([]) | join(', ') }}.
      In AAP, attach the "ServiceNow ITSM" and "Infoblox NIOS" custom
      credentials to the job template. For local runs, export them in
      your shell first (see README → Local Testing).
    success_msg: "All required credential env vars are present."

- name: "Preflight | Validate snow_task_sys_id was supplied"
  ansible.builtin.assert:
    that:
      - snow_task_sys_id is string
      - snow_task_sys_id | length == 32
    fail_msg: >-
      snow_task_sys_id must be a 32-char ServiceNow sys_id. Supply it via
      the AAP survey or `-e snow_task_sys_id=<sys_id>`. Got:
      "{{ snow_task_sys_id | default('') }}"

- name: "Preflight | Validate infoblox_csv_operation"
  ansible.builtin.assert:
    that:
      - infoblox_csv_operation in valid_csv_operations
    fail_msg: >-
      infoblox_csv_operation must be one of {{ valid_csv_operations | join(', ') }}.
      Got: "{{ infoblox_csv_operation }}"

- name: "Preflight | Compose ServiceNow provider block"
  ansible.builtin.set_fact:
    snow_provider: >-
      {{
        snow_provider_base
        | combine(
            {'client_id': snow_client_id, 'client_secret': snow_client_secret, 'grant_type': 'password'}
            if snow_auth_type == 'oauth' else {}
          )
      }}

- name: "Preflight | Build NIOS WAPI base URL"
  ansible.builtin.set_fact:
    wapi_base_url: "https://{{ infoblox_host }}/wapi/v{{ infoblox_wapi_version }}"
    csv_local_path: "{{ csv_download_dir }}/snow_request_{{ snow_task_sys_id }}.csv"

# ===========================================================================
# 1. FETCH THE CATALOG TASK
# ===========================================================================
- name: "ServiceNow | Get sc_task by sys_id"
  servicenow.itsm.api:
    instance: "{{ snow_provider }}"
    resource: sc_task
    action: get
    sys_id: "{{ snow_task_sys_id }}"
  register: snow_task_result

- name: "ServiceNow | Fail if no task was returned"
  ansible.builtin.assert:
    that:
      - snow_task_result.record is defined
      - snow_task_result.record.sys_id is defined
    fail_msg: "No sc_task found with sys_id={{ snow_task_sys_id }}"

- name: "ServiceNow | Show task summary"
  ansible.builtin.debug:
    msg: >-
      Task {{ snow_task_result.record.number }} — state
      {{ snow_task_result.record.state }} — short description:
      {{ snow_task_result.record.short_description | default('(none)') }}

# ===========================================================================
# 2. LOCATE AND DOWNLOAD THE CSV ATTACHMENT
# ===========================================================================
- name: "ServiceNow | List attachments on this sc_task"
  servicenow.itsm.api:
    instance: "{{ snow_provider }}"
    resource: sys_attachment
    action: get
    query_params:
      sysparm_query: "table_name=sc_task^table_sys_id={{ snow_task_sys_id }}"
  register: snow_attachments_result

- name: "ServiceNow | Filter for CSV attachments"
  ansible.builtin.set_fact:
    csv_attachments: >-
      {{
        snow_attachments_result.record
        | default([])
        | selectattr('file_name', 'match', '(?i).+\\.csv$')
        | list
      }}

- name: "ServiceNow | Fail if no CSV attachment present"
  ansible.builtin.assert:
    that:
      - csv_attachments | length > 0
    fail_msg: >-
      sc_task {{ snow_task_sys_id }} has no .csv attachment. Found
      {{ snow_attachments_result.record | default([]) | length }} attachment(s)
      total. Aborting.

- name: "ServiceNow | Pick the most recent CSV (by sys_created_on)"
  ansible.builtin.set_fact:
    csv_attachment: "{{ csv_attachments | sort(attribute='sys_created_on') | last }}"

- name: "ServiceNow | Show selected CSV"
  ansible.builtin.debug:
    msg: >-
      Selected attachment {{ csv_attachment.file_name }}
      ({{ csv_attachment.size_bytes }} bytes,
      sys_id={{ csv_attachment.sys_id }})

- name: "ServiceNow | Download CSV via /api/now/attachment/<sys_id>/file"
  ansible.builtin.uri:
    url: "https://{{ snow_instance }}/api/now/attachment/{{ csv_attachment.sys_id }}/file"
    method: GET
    url_username: "{{ snow_user }}"
    url_password: "{{ snow_password }}"
    force_basic_auth: true
    return_content: false
    dest: "{{ csv_local_path }}"
    status_code: 200
    headers:
      Accept: "text/csv"
  register: csv_download
  no_log: true

- name: "ServiceNow | Confirm downloaded CSV is non-empty"
  ansible.builtin.stat:
    path: "{{ csv_local_path }}"
  register: csv_file_stat
  failed_when:
    - not csv_file_stat.stat.exists or csv_file_stat.stat.size == 0

# ===========================================================================
# 3. SUBMIT CSV TO NIOS NATIVE csv_import
# ===========================================================================
# NIOS uses a 3-step pattern for CSV import: uploadinit → POST file → csv_import.
# Step 1 returns a one-time URL+token; the bulk file POST goes to that URL
# (bypassing the WAPI's request pipeline); step 3 hands NIOS the token saying
# "process the file already in your staging area."

- name: "Infoblox | Step 1 — uploadinit (request a one-time upload URL)"
  ansible.builtin.uri:
    url: "{{ wapi_base_url }}/fileop?_function=uploadinit"
    method: POST
    url_username: "{{ infoblox_user }}"
    url_password: "{{ infoblox_password }}"
    force_basic_auth: true
    validate_certs: "{{ infoblox_provider.validate_certs }}"
    body_format: json
    body:
      filename: "{{ csv_attachment.file_name }}"
    status_code: 200
    return_content: true
  register: nios_uploadinit
  no_log: true

- name: "Infoblox | Capture upload URL + token + session cookie"
  ansible.builtin.set_fact:
    nios_upload_url: "{{ nios_uploadinit.json.url }}"
    nios_upload_token: "{{ nios_uploadinit.json.token }}"
    # The Set-Cookie header from uploadinit must travel with the file POST —
    # the http_direct_file_io endpoint validates this session cookie.
    nios_session_cookie: "{{ nios_uploadinit.set_cookie | default('') }}"

- name: "Infoblox | Step 2 — POST CSV to the one-time upload URL"
  ansible.builtin.uri:
    url: "{{ nios_upload_url }}"
    method: POST
    validate_certs: "{{ infoblox_provider.validate_certs }}"
    # Pass session cookie from step 1 — basic auth is not honoured on
    # the http_direct_file_io endpoint in some NIOS versions.
    headers:
      Cookie: "{{ nios_session_cookie }}"
    body_format: form-multipart
    body:
      file:
        filename: "{{ csv_local_path }}"
        mime_type: text/csv
    status_code: [200, 201, 204]
  register: nios_file_upload
  no_log: true

- name: "Infoblox | Step 3 — csv_import (start the import job)"
  ansible.builtin.uri:
    url: "{{ wapi_base_url }}/fileop?_function=csv_import"
    method: POST
    url_username: "{{ infoblox_user }}"
    url_password: "{{ infoblox_password }}"
    force_basic_auth: true
    validate_certs: "{{ infoblox_provider.validate_certs }}"
    body_format: json
    body:
      action: START
      operation: "{{ infoblox_csv_operation }}"
      on_error: CONTINUE
      token: "{{ nios_upload_token }}"
    status_code: 201
    return_content: true
  register: nios_csv_import_start
  no_log: true

- name: "Infoblox | Resolve csvimporttask reference"
  ansible.builtin.set_fact:
    # csv_import returns either a bare ref string ("csvimporttask/...") or
    # an object with a _ref key, depending on NIOS version. Handle both.
    csvimporttask_ref: >-
      {{
        nios_csv_import_start.json._ref
        if (nios_csv_import_start.json is mapping)
        else nios_csv_import_start.json
      }}

- name: "Infoblox | Show csvimporttask reference"
  ansible.builtin.debug:
    msg: "Started import task: {{ csvimporttask_ref }}"

# ===========================================================================
# 4. POLL THE csvimporttask UNTIL TERMINAL STATUS
# ===========================================================================
- name: "Infoblox | Build csvimporttask poll URL with extra return fields"
  ansible.builtin.set_fact:
    csvimporttask_poll_url: >-
      {{ wapi_base_url }}/{{ csvimporttask_ref }}?_return_fields%2B={{
      csvimporttask_return_fields | join(',') }}

- name: "Infoblox | Poll csvimporttask until terminal status"
  ansible.builtin.uri:
    url: "{{ csvimporttask_poll_url }}"
    method: GET
    url_username: "{{ infoblox_user }}"
    url_password: "{{ infoblox_password }}"
    force_basic_auth: true
    validate_certs: "{{ infoblox_provider.validate_certs }}"
    status_code: 200
    return_content: true
  register: nios_csv_status
  until: nios_csv_status.json.status in csv_terminal_statuses
  retries: "{{ csv_poll_retries }}"
  delay: "{{ csv_poll_delay_seconds }}"
  no_log: true

- name: "Infoblox | Show final import status"
  ansible.builtin.debug:
    msg:
      status: "{{ nios_csv_status.json.status }}"
      operation: "{{ nios_csv_status.json.operation | default('?') }}"
      lines_processed: "{{ nios_csv_status.json.lines_processed | default(0) }}"
      errors_count: "{{ nios_csv_status.json.errors_count | default(0) }}"
      import_id: "{{ nios_csv_status.json.import_id | default('?') }}"

# ===========================================================================
# 5. REPORT BACK TO SERVICENOW + CLEAN UP
# ===========================================================================
- name: "Compute | Derive success/failure counts"
  ansible.builtin.set_fact:
    nios_lines_processed: "{{ nios_csv_status.json.lines_processed | default(0) | int }}"
    nios_errors_count: "{{ nios_csv_status.json.errors_count | default(0) | int }}"
    nios_final_status: "{{ nios_csv_status.json.status }}"

- name: "Compute | Lines succeeded"
  ansible.builtin.set_fact:
    nios_lines_succeeded: "{{ nios_lines_processed | int - nios_errors_count | int }}"

- name: "ServiceNow | Build work_notes summary"
  ansible.builtin.set_fact:
    snow_work_notes: |
      Infoblox CSV import complete for {{ csv_attachment.file_name }}.

      NIOS csvimporttask:  {{ csvimporttask_ref }}
      Final status:        {{ nios_final_status }}
      Operation:           {{ infoblox_csv_operation }}
      Lines processed:     {{ nios_lines_processed }}
      Lines succeeded:     {{ nios_lines_succeeded }}
      Lines failed:        {{ nios_errors_count }}

      {% if nios_errors_count | int > 0 %}
      Per-row error details are available in the NIOS UI under
      Administration → Workflow → CSV Job Manager → import_id
      {{ nios_csv_status.json.import_id | default('(unknown)') }}.
      {% endif %}

- name: "ServiceNow | Determine final task state"
  ansible.builtin.set_fact:
    # Close as Closed Complete only on full success. Partial or total failure
    # is left in the current state for human review — they can see the
    # work_notes and pull the error log from NIOS.
    snow_final_state: >-
      {{
        snow_state_closed_complete
        if (nios_final_status == 'COMPLETED' and nios_errors_count | int == 0)
        else snow_task_result.record.state
      }}

- name: "ServiceNow | Update sc_task with results"
  servicenow.itsm.api:
    instance: "{{ snow_provider }}"
    resource: sc_task
    action: patch
    sys_id: "{{ snow_task_sys_id }}"
    data:
      work_notes: "{{ snow_work_notes }}"
      state: "{{ snow_final_state }}"
  register: snow_update_result

- name: "Cleanup | Remove downloaded CSV from /tmp"
  ansible.builtin.file:
    path: "{{ csv_local_path }}"
    state: absent

- name: "Final | Print run summary"
  ansible.builtin.debug:
    msg:
      task: "{{ snow_task_result.record.number }}"
      nios_status: "{{ nios_final_status }}"
      processed: "{{ nios_lines_processed }}"
      succeeded: "{{ nios_lines_succeeded }}"
      failed: "{{ nios_errors_count }}"

# AAP marks the job red on a hard fail. We hard-fail when:
#   - NIOS itself ended in FAILED/STOPPED, OR
#   - 100% of processed lines failed (and lines_processed > 0)
- name: "Final | Fail the play on total NIOS failure"
  ansible.builtin.fail:
    msg: >-
      NIOS csv_import ended in status {{ nios_final_status }} with
      {{ nios_errors_count }}/{{ nios_lines_processed }} failed lines.
      See work_notes on sc_task {{ snow_task_result.record.number }} and
      NIOS CSV Job Manager (import_id
      {{ nios_csv_status.json.import_id | default('?') }}) for details.
  when: >-
    nios_final_status in ['FAILED', 'STOPPED']
    or (nios_lines_processed | int > 0 and nios_lines_succeeded | int == 0)
