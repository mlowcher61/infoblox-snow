---
# Defaults for snow_to_infoblox.
#
# Two classes of variables live here:
#
# 1. Credentials sourced from environment variables. AAP injects these via
#    the custom credential types in aap/credential_types/. For local
#    testing, just `export VAR=...` before running the playbook.
#
# 2. Non-secret runtime knobs (sys_id, NIOS csv_import operation, polling
#    timeouts). Safe to commit. Override per-run via the AAP survey or `-e`.

# ---------------------------------------------------------------------------
# ServiceNow credentials (env-injected by AAP "ServiceNow ITSM" credential)
# ---------------------------------------------------------------------------
snow_instance: "{{ lookup('env', 'SNOW_INSTANCE') }}"
snow_user: "{{ lookup('env', 'SNOW_USER') }}"
snow_password: "{{ lookup('env', 'SNOW_PASSWORD') }}"
snow_auth_type: "{{ lookup('env', 'SNOW_AUTH_TYPE') | default('basic', true) }}"
snow_client_id: "{{ lookup('env', 'SNOW_CLIENT_ID') }}"
snow_client_secret: "{{ lookup('env', 'SNOW_CLIENT_SECRET') }}"

# ---------------------------------------------------------------------------
# Infoblox credentials (env-injected by AAP "Infoblox NIOS" credential)
# ---------------------------------------------------------------------------
infoblox_host: "{{ lookup('env', 'INFOBLOX_HOST') }}"
infoblox_user: "{{ lookup('env', 'INFOBLOX_USER') }}"
infoblox_password: "{{ lookup('env', 'INFOBLOX_PASSWORD') }}"
infoblox_wapi_version: "{{ lookup('env', 'INFOBLOX_WAPI_VERSION') | default('2.11', true) }}"

# ---------------------------------------------------------------------------
# Non-secret runtime knobs (overridden by AAP survey / extra-vars)
# ---------------------------------------------------------------------------
snow_task_sys_id: ""

# NIOS csv_import operation. Choose based on what the source CSV represents:
#   INSERT   — only add new records; fail any row whose key already exists
#   OVERRIDE — replace existing records entirely with the CSV row
#   MERGE    — update fields present in CSV; leave other fields untouched
#   CUSTOM   — use the IMPORT-ACTION column on each row to pick per-row
#   REPLACE  — bulk-replace all records of this type
#   DELETE   — remove records named in the CSV
#
# Default MERGE is the gentlest: existing records get updated, new ones
# get created, no fields are dropped. Switch to INSERT if your catalog
# task only ever adds hosts (so a duplicate is a real error, not a sync).
infoblox_csv_operation: MERGE

# How long to wait for the csvimporttask to reach a terminal state.
# Total ceiling = csv_poll_retries * csv_poll_delay_seconds.
# 60 * 5s = 5 minutes. Bump csv_poll_retries for very large imports.
csv_poll_retries: 60
csv_poll_delay_seconds: 5

# Where to stage the downloaded CSV during the run. Tempfile in /tmp keeps
# AAP execution-environment containers happy; the file is unlinked at the end.
csv_download_dir: "/tmp"

# State value that ServiceNow uses for "Closed Complete" on sc_task.
snow_state_closed_complete: 3
