---
# Internal constants. Anything that must NOT be overridden by extra-vars
# lives here. Anything an operator might reasonably tweak lives in defaults.

snow_required_env_vars:
  - SNOW_INSTANCE
  - SNOW_USER
  - SNOW_PASSWORD

infoblox_required_env_vars:
  - INFOBLOX_HOST
  - INFOBLOX_USER
  - INFOBLOX_PASSWORD

# Provider block reused by every servicenow.itsm.* call. Auth-type-specific
# fields are layered on conditionally in tasks/main.yml.
snow_provider_base:
  instance: "https://{{ snow_instance }}"
  username: "{{ snow_user }}"
  password: "{{ snow_password }}"

# Provider block — kept here for any future direct nios_modules calls and
# for the validate_certs flag the WAPI uri tasks honour.
infoblox_provider:
  host: "{{ infoblox_host }}"
  username: "{{ infoblox_user }}"
  password: "{{ infoblox_password }}"
  wapi_version: "{{ infoblox_wapi_version }}"
  validate_certs: true

# Allowed values for infoblox_csv_operation (used by preflight assertion).
valid_csv_operations:
  - INSERT
  - OVERRIDE
  - MERGE
  - CUSTOM
  - REPLACE
  - DELETE

# csvimporttask.status values that mean "no longer running." Polling stops
# when the status enters this set.
csv_terminal_statuses:
  - COMPLETED
  - COMPLETED_WITH_ERRORS
  - FAILED
  - STOPPED

# Fields to request when polling csvimporttask. Joined with commas into the
# `_return_fields%2B=` query string. List form keeps the source readable
# inside YAML's 160-col line limit.
csvimporttask_return_fields:
  - status
  - operation
  - file_name
  - file_size
  - lines_processed
  - errors_count
  - import_id
  - start_time
  - end_time
