---
# Example Job Template definition for the snow_to_infoblox role.
#
# Apply via the AAP UI (Resources → Templates → Add → Job Template) or the
# automation-controller collection:
#   ansible.controller.job_template
#
# Prerequisites (create these first):
#   1. Project pointing at this git repo (with collections/requirements.yml).
#   2. Inventory (any inventory; the role runs on localhost).
#   3. Two custom credential types from aap/credential_types/ applied:
#        - "ServiceNow ITSM"
#        - "Infoblox NIOS"
#   4. Two Credentials of those types populated with real values.

name: "ServiceNow → Infoblox CSV Import"
job_type: run
inventory: "Demo Inventory"            # replace with your inventory
project: "snow-infoblox-automation"    # replace with your project
playbook: "playbooks/snow_to_infoblox.yml"

# Attach BOTH custom credentials. AAP merges their injectors so all env
# vars (SNOW_*, INFOBLOX_*) land in the playbook process at launch.
credentials:
  - "ServiceNow ITSM Production"       # Credential of type "ServiceNow ITSM"
  - "Infoblox NIOS Production"         # Credential of type "Infoblox NIOS"

# Survey: prompts the operator for the catalog task at launch time.
survey_enabled: true
survey_spec:
  name: "ServiceNow Task Input"
  description: "Provide the sc_task sys_id and the NIOS import strategy"
  spec:
    - variable: snow_task_sys_id
      type: text
      question_name: "ServiceNow sc_task sys_id"
      question_description: "32-char sys_id of the catalog task to process"
      required: true
      min: 32
      max: 32

    # NIOS csv_import operation. MERGE is the role default; surface here so
    # an operator can tighten to INSERT (only-create) or widen to OVERRIDE
    # for a specific batch without editing defaults/main.yml.
    - variable: infoblox_csv_operation
      type: multiplechoice
      question_name: "NIOS csv_import operation"
      question_description: |
        INSERT  — fail rows whose key already exists (strict additive)
        MERGE   — update existing rows, create missing rows (default)
        OVERRIDE — replace entire records with CSV contents
        CUSTOM  — per-row IMPORT-ACTION column drives behaviour
      choices:
        - INSERT
        - MERGE
        - OVERRIDE
        - CUSTOM
        - REPLACE
        - DELETE
      default: MERGE
      required: true

# Recommended: wire to a webhook so ServiceNow can trigger this template
# directly from the catalog task workflow.
# webhook_service: github   # or gitlab — depends on your AAP integration
