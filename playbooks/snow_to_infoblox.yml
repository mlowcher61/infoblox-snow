---
# Entry playbook for the snow_to_infoblox role.
#
# This playbook is what the AAP job template calls. Credentials are
# injected as environment variables by the attached AAP custom credentials —
# the role reads them via lookup('env', ...) in defaults/main.yml.
#
# Local invocation (no AAP):
#   export SNOW_INSTANCE=...     SNOW_USER=...     SNOW_PASSWORD=...
#   export INFOBLOX_HOST=...     INFOBLOX_USER=... INFOBLOX_PASSWORD=...
#   ansible-playbook playbooks/snow_to_infoblox.yml \
#       -e snow_task_sys_id=<32-char-sys_id>
#
# AAP invocation:
#   The "ServiceNow → Infoblox CSV Import" job template (see
#   aap/job_template.yml) prompts the operator for snow_task_sys_id via
#   the survey and attaches both credentials.

- name: "Import ServiceNow CSV attachment into Infoblox"
  hosts: localhost
  gather_facts: false
  connection: local

  # We don't put any vars here on purpose — the role provides everything
  # via defaults, and the survey/extra-vars layer overrides as needed.

  roles:
    - role: snow_to_infoblox
